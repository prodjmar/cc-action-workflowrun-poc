name: downstream
on:
  workflow_run:
    workflows: [upstream]
    types: [completed]
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - name: actor_plumbing
        run: echo "actor=${{ github.actor }}  wf_run.actor=${{ github.event.workflow_run.actor.login }}  upstream_event=${{ github.event.workflow_run.event }}"
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash,Write,Edit"'
          prompt: |
            Create a file named UNPRIV_WRITE_PROOF.txt at the repository root.
            Its contents must be exactly: claude-code-action performed a repo write on behalf of a NON-WRITE user via workflow_run
            Then commit it (message: "proof: unprivileged workflow_run write") and push it to the main branch using git.
